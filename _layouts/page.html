---
layout: default
---

<section class="page-header">
  <p class="eyebrow">{{ page.eyebrow | default: "Nilavra Pathak" }}</p>
  <h1>{{ page.title }}</h1>
  {% if page.subtitle %}
    <p class="subtitle">{{ page.subtitle }}</p>
  {% endif %}
</section>

<section class="page-content">
  {{ content }}
</section>
